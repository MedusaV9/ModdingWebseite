<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>BAPBAP Modding — OG image template (1200×630)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Teko:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
      }

      body {
        position: relative;
        background-color: #150b10;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Faint pink grid, same treatment as the hero */
      .grid {
        position: absolute;
        inset: 0;
        background-image:
          repeating-linear-gradient(
            to right,
            rgba(255, 42, 109, 0.05) 0,
            rgba(255, 42, 109, 0.05) 1px,
            transparent 1px,
            transparent 64px
          ),
          repeating-linear-gradient(
            to bottom,
            rgba(255, 42, 109, 0.05) 0,
            rgba(255, 42, 109, 0.05) 1px,
            transparent 1px,
            transparent 64px
          );
      }

      .lockup {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        text-align: center;
      }

      .emblem {
        width: 160px;
        height: 160px;
      }

      h1 {
        font-family: 'Archivo Black', sans-serif;
        font-size: 92px;
        line-height: 1;
        text-transform: uppercase;
        color: #ffffff;
      }

      h1 .modding {
        background: linear-gradient(to left, #eb204f, #ff2a6d);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .tagline {
        font-family: 'Teko', sans-serif;
        font-size: 44px;
        line-height: 1;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.8);
      }

      .tagline .x {
        color: #ff2a6d;
      }

      .discord {
        position: absolute;
        right: 40px;
        bottom: 32px;
        font-family: 'Teko', sans-serif;
        font-size: 32px;
        line-height: 1;
        text-transform: uppercase;
        color: #ff2a6d;
      }
    </style>
  </head>
  <body>
    <div class="grid"></div>

    <div class="lockup">
      <svg class="emblem" viewBox="0 0 96 96" aria-hidden="true">
        <defs>
          <linearGradient id="burst" x1="1" y1="0" x2="0" y2="0">
            <stop offset="0" stop-color="#eb204f" />
            <stop offset="1" stop-color="#ff2a6d" />
          </linearGradient>
        </defs>
        <polygon points="48,2 56.8,15.16 71,8.16 72.04,23.96 87.84,25 80.84,39.2 94,48 80.84,56.8 87.84,71 72.04,72.04 71,87.84 56.8,80.84 48,94 39.2,80.84 25,87.84 23.96,72.04 8.16,71 15.16,56.8 2,48 15.16,39.2 8.16,25 23.96,23.96 25,8.16 39.2,15.16" fill="#f89d37" transform="translate(4 4)" />
        <polygon points="48,2 56.8,15.16 71,8.16 72.04,23.96 87.84,25 80.84,39.2 94,48 80.84,56.8 87.84,71 72.04,72.04 71,87.84 56.8,80.84 48,94 39.2,80.84 25,87.84 23.96,72.04 8.16,71 15.16,56.8 2,48 15.16,39.2 8.16,25 23.96,23.96 25,8.16 39.2,15.16" fill="url(#burst)" />
        <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
          <g transform="rotate(45 48 48)">
            <path d="M40 26v8l8 8 8-8v-8" />
            <path d="M48 42v28" />
          </g>
          <path transform="rotate(-45 48 48)" d="M52 24 44 46h8L44 68" />
        </g>
      </svg>

      <h1>BAPBAP <span class="modding">MODDING</span></h1>

      <p class="tagline">
        COMMUNITY MODS <span class="x">✕</span> CUSTOM MODES
        <span class="x">✕</span> ONE LAUNCHER
      </p>
    </div>

    <p class="discord">discord.gg/BAPBAPMods</p>
  </body>
</html>
